{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2>Export 3D From DMA</h2>
    <form method="POST">
        <div class="form-group">
            <label for="dma_reference">DMA reference/revision</label>
            <input type="text" id="dma_reference" name="dma_reference" class="form-control" required>
        </div>
        <div class="form-group" style="margin-top: 15px;">
            <label>
                <input type="checkbox" id="step" name="step" onclick="if(this.checked) document.getElementById('thickness').checked=false;"> Step
            </label>
        </div>
        <div class="form-group">
            <label>
                <input type="checkbox" id="thickness" name="thickness" onclick="if(this.checked) document.getElementById('step').checked=false;"> Thickness
            </label>
        </div>
        <button type="submit" class="btn" style="width: 100%; margin-top: 20px;">Submit</button>
    </form>
</div>
{% endblock %}
