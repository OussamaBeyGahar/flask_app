{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2 style="margin-bottom: 2rem; color: var(--primary-color);">Create Account</h2>
    <form method="POST" action="{{ url_for('register') }}">
        <div class="form-group">
            <label for="first_name">First Name</label>
            <input type="text" id="first_name" name="first_name" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="last_name">Last Name</label>
            <input type="text" id="last_name" name="last_name" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="country">Country</label>
            <select id="country" name="country" class="form-control" required>
                <option value="" disabled selected>Select your country</option>
                <option value="Belgium">Belgium</option>
                <option value="France">France</option>
                <option value="Tunisia">Tunisia</option>
            </select>
        </div>
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn">Register</button>
    </form>
    <p style="margin-top: 1.5rem; color: #636e72;">
        Already have an account? <a href="{{ url_for('login') }}"
            style="color: var(--primary-color); text-decoration: none; font-weight: 600;">Login here</a>
    </p>
</div>
{% endblock %}
