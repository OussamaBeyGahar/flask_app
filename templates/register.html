{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2 style="margin-bottom: 2rem; color: var(--primary-color);">Create Account</h2>
    <form method="POST" action="{{ url_for('register') }}">
        <div class="form-group">
            <label for="first_name">First Name</label>
            <input type="text" id="first_name" name="first_name" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="last_name">Last Name</label>
            <input type="text" id="last_name" name="last_name" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="site_source">Site Source</label>
            <select id="site_source" name="site_source" class="form-control" required>
                <option value="" disabled selected>Select site source</option>
                <option value="BAT">BAT</option>
                <option value="BGL">BGL</option>
                <option value="BLO">BLO</option>
                <option value="BLR">BLR</option>
                <option value="OXL">OXL</option>
            </select>
        </div>
        <div class="form-group">
            <label for="site_destination">Site Destination</label>
            <select id="site_destination" name="site_destination" class="form-control" required>
                <option value="" disabled selected>Select site destination</option>
                <option value="BAT">BAT</option>
                <option value="BGL">BGL</option>
                <option value="BLO">BLO</option>
                <option value="BLR">BLR</option>
                <option value="OX">OX</option>
            </select>
        </div>
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn">Register</button>
    </form>
    <p style="margin-top: 1.5rem; color: #636e72;">
        Already have an account? <a href="{{ url_for('login') }}"
            style="color: var(--primary-color); text-decoration: none; font-weight: 600;">Login here</a>
    </p>
</div>
{% endblock %}
