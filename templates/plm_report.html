{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2>Import PLM repport</h2>
    <form method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label for="plm_file">Select Excel file</label>
            <input type="file" id="plm_file" name="plm_file" class="form-control-file" accept=".xlsx, .xlsm" required>
            <small class="form-text text-muted">Accepted formats: .xlsx, .xlsm</small>
        </div>
        <button type="submit" class="btn" style="width: 100%; margin-top: 20px;">Submit</button>
    </form>
</div>
{% endblock %}
