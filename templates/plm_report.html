{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2>Import PLM repport</h2>
    <form method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label for="plm_file">Select Excel file</label>
            <input type="file" id="plm_file" name="plm_file" class="form-control-file" accept=".xlsx,.xlsm" multiple required>
            <small class="form-text text-muted">Accepted formats: .xlsx, .xlsm — multiple files allowed</small>
        </div>
        <button type="submit" class="btn" style="width: 100%; margin-top: 20px;">Submit</button>
    </form>

    {% if error %}
    <div style="margin-top: 1.5rem; padding: 1rem; background: #fff0f0; border-left: 4px solid #d63031; border-radius: 4px;">
        <strong>Error:</strong>
        <pre style="margin: 0.5rem 0 0; white-space: pre-wrap; font-size: 0.85rem;">{{ error }}</pre>
    </div>
    {% endif %}

    {% if results %}
    <div style="margin-top: 1.5rem;">
        {% for r in results %}
        <div style="padding: 0.75rem 1rem; background: var(--secondary-color); border-radius: 4px; margin-bottom: 0.5rem;">
            <strong>{{ r.filename }}</strong> — queued.
            <a href="{{ r.hyperlink }}" style="margin-left: 1rem; color: var(--primary-color);">Open report folder</a>
        </div>
        {% endfor %}
    </div>
    {% endif %}
</div>
{% endblock %}
