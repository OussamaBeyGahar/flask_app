{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2>TCRA Report</h2>
    <h3 style="margin-bottom: 20px; font-weight: 600;">Delta DMA Cross Check</h3>
    <form method="POST" enctype="multipart/form-data">

        <div
            style="margin-top: 20px; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px;">
            <strong style="display: block; margin-bottom: 10px;">SOURCE</strong>
            <p style="margin-bottom: 10px; font-weight: 500; color: var(--label-color);">Reference/revision or TCRA
                File:</p>

            <div style="display: flex; gap: 20px; margin-bottom: 15px;">
                <label style="display: flex; align-items: center; gap: 5px;">
                    <input type="radio" name="select_from" value="REFERENCE" id="radio_source_reference" checked
                        onchange="toggleSourceInput()"> Generate TCRA by reference/revision/date
                </label>
                <label style="display: flex; align-items: center; gap: 5px;">
                    <input type="radio" name="select_from" value="FILE" id="radio_source_file"
                        onchange="toggleSourceInput()"> Load file
                </label>
            </div>

            <div id="source_ref_group">
                <div class="form-group" style="margin-bottom: 10px;">
                    <label for="tcReference_from">Reference/revision Teamcenter:</label>
                    <input type="text" id="tcReference_from" name="tcReference_from" class="form-control"
                        placeholder="e.g. AK00000000000/D">
                </div>
                <div class="form-group">
                    <label for="tcReference_date">Date of TCRA generation:</label>
                    <input type="date" id="tcReference_date" name="tcReference_date" class="form-control">
                </div>
            </div>

            <div class="form-group" id="source_file_group" style="display: none;">
                <label for="fileTCRA_from">Select a TCRA file:</label>
                <input type="file" id="fileTCRA_from" name="fileTCRA_from" class="form-control"
                    accept=".xlsx,.xlsm,.xls">
            </div>
        </div>

        <div style="margin-bottom: 20px;">
            <strong style="display: block; margin-bottom: 10px;">DESTINATION</strong>
            <div class="form-group">
                <label for="dmaReference_from">Reference/revision DMA:</label>
                <input type="text" id="dmaReference_from" name="dmaReference_from" class="form-control"
                    placeholder="e.g. AK00000000000/D" required>
            </div>
        </div>

        <button type="submit" class="btn" style="width: 100%;">Submit</button>
    </form>

    {% if error %}
    <div style="margin-top: 1.5rem; padding: 1rem; background: #fff0f0; border-left: 4px solid #d63031; border-radius: 4px;">
        <strong>Error:</strong>
        <pre style="margin: 0.5rem 0 0; white-space: pre-wrap; font-size: 0.85rem;">{{ error }}</pre>
    </div>
    {% endif %}
</div>

<script>
    function toggleSourceInput() {
        const loadRefRadio = document.getElementById('radio_source_reference');
        const refGroup = document.getElementById('source_ref_group');
        const fileGroup = document.getElementById('source_file_group');
        const fileInput = document.getElementById('fileTCRA_from');

        if (loadRefRadio.checked) {
            refGroup.style.display = 'block';
            fileGroup.style.display = 'none';
            fileInput.required = false;
        } else {
            refGroup.style.display = 'none';
            fileGroup.style.display = 'block';
            fileInput.required = true;
        }
    }

    document.addEventListener("DOMContentLoaded", toggleSourceInput);
</script>
{% endblock %}
