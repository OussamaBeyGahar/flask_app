{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2>TCRA Report</h2>
    <h3 style="margin-bottom: 20px; font-weight: 600;">Delta ENG Cross Check</h3>
    <form method="POST">

        <div style="margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px;">
            <strong style="display: block; margin-bottom: 10px;">Document Extract Options :</strong>
            <div class="form-group" style="margin-bottom: 5px;">
                <label>
                    <input type="checkbox" name="include_specifications"> Include Specifications
                </label>
            </div>
            <div class="form-group">
                <label>
                    <input type="checkbox" name="include_references"> Include References
                </label>
            </div>
        </div>

        <div style="margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px;">
            <strong style="display: block; margin-bottom: 10px;">SOURCE</strong>
            <div class="form-group" style="margin-bottom: 10px;">
                <label for="source_tcra_reference">Reference/revision Teamcenter:</label>
                <input type="text" id="source_tcra_reference" name="source_tcra_reference" class="form-control"
                    required>
            </div>
            <div class="form-group">
                <label for="source_tcra_date">Date of TCRA generation:</label>
                <input type="date" id="source_tcra_date" name="source_tcra_date" class="form-control"
                    placeholder="dd-mm-yyyy" required>
            </div>
        </div>

        <div style="margin-bottom: 20px;">
            <strong style="display: block; margin-bottom: 10px;">DESTINATION</strong>
            <div class="form-group" style="margin-bottom: 10px;">
                <label for="dest_tcra_reference">Reference/revision Teamcenter:</label>
                <input type="text" id="dest_tcra_reference" name="dest_tcra_reference" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="dest_tcra_date">Date of TCRA generation:</label>
                <input type="date" id="dest_tcra_date" name="dest_tcra_date" class="form-control"
                    placeholder="dd-mm-yyyy" required>
            </div>
        </div>

        <button type="submit" class="btn" style="width: 100%;">Submit</button>
    </form>
</div>
{% endblock %}
