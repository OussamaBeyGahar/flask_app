{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 820px; margin: 0 auto;">
    <h2>Export 3D — User Report Assembly</h2>

    <!-- Action bar -->
    <div style="margin-bottom: 1rem; display: flex; gap: 0.5rem; flex-wrap: wrap;">
        <button class="btn" onclick="addFolder()">Add Folder</button>
        <button class="btn" onclick="showAddRef()">Add DMA Ref</button>
        <button class="btn" style="background: #d63031;" onclick="removeSelected()">Remove</button>
    </div>

    <!-- DMA ref input panel -->
    <div id="refPanel" style="display:none; margin-bottom:1rem; padding:1rem; background:#f5f5f5; border-radius:4px;">
        <p style="margin:0 0 0.5rem;">Enter DMA references (ref/rev, one per line):</p>
        <textarea id="refInput" style="width:100%; height:120px; font-family:monospace; box-sizing:border-box;"></textarea>
        <div style="margin-top:0.5rem; display:flex; gap:0.5rem;">
            <button class="btn" onclick="validateAndAddRefs()">Validate &amp; Add</button>
            <button class="btn" style="background:#636e72;" onclick="document.getElementById('refPanel').style.display='none'">Cancel</button>
        </div>
    </div>

    <!-- Tree container -->
    <div id="treeContainer" style="border:1px solid #ddd; min-height:200px; padding:1rem; margin-bottom:1rem; background:#fff; border-radius:4px; font-family:monospace; font-size:0.9rem;">
        <ul id="treeRoot" style="list-style:none; padding:0; margin:0;">
            <li id="rootNode" class="tree-node tree-folder" data-type="folder" data-id="0" onclick="selectNode(this)">
                &#128193; <span class="node-title" ondblclick="renameNode(this)">Report Name</span>
                <ul class="tree-children" style="list-style:none; padding-left:1.5rem; margin:0;"></ul>
            </li>
        </ul>
    </div>

    <!-- Submit form -->
    <form id="submitForm" method="POST">
        <input type="hidden" id="tree_xml" name="tree_xml">
        <div style="display:flex; align-items:center; gap:1.5rem; flex-wrap:wrap;">
            <label style="display:flex; align-items:center; gap:0.4rem;">
                <input type="checkbox" id="step" name="step"> Step
            </label>
            <button type="submit" class="btn" style="flex:1; min-width:150px;">Submit Report</button>
        </div>
    </form>

    {% if error %}
    <div style="margin-top: 1.5rem; padding: 1rem; background: #fff0f0; border-left: 4px solid #d63031; border-radius: 4px;">
        <strong>Error:</strong>
        <pre style="margin: 0.5rem 0 0; white-space: pre-wrap; font-size: 0.85rem;">{{ error }}</pre>
    </div>
    {% endif %}
</div>

<style>
.tree-node { cursor: pointer; padding: 3px 6px; border-radius: 3px; user-select: none; }
.tree-node:hover { background: #e8f4fd; }
.tree-node.selected { background: #3498db; color: #fff; }
</style>

<script>
let nodeCounter = 1;
let selectedNode = document.getElementById('rootNode');
selectedNode.classList.add('selected');

function selectNode(el) {
    el.stopPropagation && el.stopPropagation();
    if (selectedNode) selectedNode.classList.remove('selected');
    selectedNode = el;
    el.classList.add('selected');
}

document.getElementById('treeContainer').addEventListener('click', function(e) {
    const node = e.target.closest('.tree-node');
    if (node) { e.stopPropagation(); selectNode(node); }
});

function addFolder() {
    if (!selectedNode || selectedNode.dataset.type !== 'folder') {
        alert('Select a folder node first.'); return;
    }
    const name = prompt('Folder name:', 'New Folder');
    if (!name) return;
    const li = document.createElement('li');
    li.className = 'tree-node tree-folder';
    li.dataset.type = 'folder';
    li.dataset.id = ++nodeCounter;
    li.innerHTML = '&#128193; <span class="node-title" ondblclick="renameNode(this)">' + escHtml(name) + '</span>'
                 + '<ul class="tree-children" style="list-style:none;padding-left:1.5rem;margin:0;"></ul>';
    selectedNode.querySelector('.tree-children').appendChild(li);
}

function showAddRef() {
    if (!selectedNode || selectedNode.dataset.type !== 'folder') {
        alert('Select a folder node first.'); return;
    }
    document.getElementById('refPanel').style.display = 'block';
    document.getElementById('refInput').value = '';
    document.getElementById('refInput').focus();
}

async function validateAndAddRefs() {
    const text = document.getElementById('refInput').value.trim();
    if (!text) return;
    try {
        const resp = await fetch('{{ url_for("exported3d_report_check") }}', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: 'refs=' + encodeURIComponent(text)
        });
        const result = await resp.text();
        const lines = result.split('\n').filter(l => l.trim());
        const ul = selectedNode.querySelector('.tree-children');
        for (const line of lines) {
            const li = document.createElement('li');
            li.className = 'tree-node tree-dma';
            li.dataset.type = 'dma';
            li.dataset.id = ++nodeCounter;
            li.innerHTML = '&#128196; <span class="node-title" ondblclick="renameNode(this)">' + escHtml(line.trim()) + '</span>';
            ul.appendChild(li);
        }
        document.getElementById('refPanel').style.display = 'none';
    } catch(e) {
        alert('Validation error: ' + e);
    }
}

function removeSelected() {
    if (!selectedNode || selectedNode.id === 'rootNode') {
        alert('Cannot remove the root node.'); return;
    }
    selectedNode.remove();
    selectedNode = document.getElementById('rootNode');
    selectedNode.classList.add('selected');
}

function renameNode(span) {
    const old = span.textContent;
    const input = document.createElement('input');
    input.value = old;
    input.style.cssText = 'width:180px; font-family:monospace; font-size:0.9rem;';
    span.replaceWith(input);
    input.focus(); input.select();
    const finish = () => {
        const s = document.createElement('span');
        s.className = 'node-title';
        s.ondblclick = function() { renameNode(this); };
        s.textContent = input.value || old;
        input.replaceWith(s);
    };
    input.onblur = finish;
    input.onkeydown = e => { if (e.key === 'Enter' || e.key === 'Escape') input.blur(); };
}

function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function serializeNode(node) {
    const title = node.querySelector(':scope > .node-title')?.textContent || '';
    const children = Array.from(node.querySelector(':scope > .tree-children')?.children || []);
    if (node.dataset.type === 'folder') {
        return '<R>' + escXml(title) + children.map(serializeNode).join('') + '</R>';
    } else {
        return '<DMA>' + escXml(title) + '</DMA>';
    }
}

function escXml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.getElementById('submitForm').onsubmit = function() {
    const root = document.getElementById('rootNode');
    const rootTitle = root.querySelector(':scope > .node-title')?.textContent || 'Report';
    const children = Array.from(root.querySelector(':scope > .tree-children').children);
    const xml = '<Report><R>' + escXml(rootTitle) + children.map(serializeNode).join('') + '</R></Report>';
    document.getElementById('tree_xml').value = xml;
    return true;
};
</script>
{% endblock %}
