{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2>Eco Design Report - DMA</h2>
    <form method="POST">
        <div class="form-group">
            <label for="dma_reference">DMA reference</label>
            <input type="text" id="dma_reference" name="dma_reference" class="form-control" required>
        </div>
        <button type="submit" class="btn" style="width: 100%; margin-top: 20px;">Submit</button>
    </form>

    {% if error %}
    <div style="margin-top: 1.5rem; padding: 1rem; background: #fff0f0; border-left: 4px solid #d63031; border-radius: 4px;">
        <strong>Error:</strong>
        <pre style="margin: 0.5rem 0 0; white-space: pre-wrap; font-size: 0.85rem;">{{ error }}</pre>
    </div>
    {% endif %}
</div>
{% endblock %}
