{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2 style="margin-bottom: 2rem; color: var(--primary-color);">Login</h2>
    <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn">Login</button>
    </form>
    <p style="margin-top: 1.5rem; color: #636e72;">
        Don't have an account? <a href="{{ url_for('register') }}"
            style="color: var(--primary-color); text-decoration: none; font-weight: 600;">Register here</a>
    </p>
</div>
{% endblock %}
