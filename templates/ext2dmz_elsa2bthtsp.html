{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2>EXT2DMA: ELSA2BTHTSP</h2>
    <form method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label for="elsa2bthtsp_file">Select ELSA file</label>
            <input type="file" id="elsa2bthtsp_file" name="elsa2bthtsp_file" class="form-control" required>
            <small class="form-text text-muted">Filename must contain "@" separator (e.g. ref@rev@filename)</small>
        </div>
        <button type="submit" class="btn" style="width: 100%; margin-top: 20px;">Submit</button>
    </form>

    {% if error %}
    <div style="margin-top: 1.5rem; padding: 1rem; background: #fff0f0; border-left: 4px solid #d63031; border-radius: 4px;">
        <strong>Error:</strong>
        <pre style="margin: 0.5rem 0 0; white-space: pre-wrap; font-size: 0.85rem;">{{ error }}</pre>
    </div>
    {% endif %}
</div>
{% endblock %}
