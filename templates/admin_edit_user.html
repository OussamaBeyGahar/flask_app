{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2>Edit User: {{ user.username }}</h2>
    <form method="POST">
        <div class="form-group">
            <label for="first_name">First Name</label>
            <input type="text" id="first_name" name="first_name" class="form-control"
                   value="{{ user.first_name }}" required>
        </div>
        <div class="form-group">
            <label for="last_name">Last Name</label>
            <input type="text" id="last_name" name="last_name" class="form-control"
                   value="{{ user.last_name }}" required>
        </div>
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" class="form-control"
                   value="{{ user.email }}" required>
        </div>
        <div class="form-group">
            <label for="site_source">Site Source</label>
            <select id="site_source" name="site_source" class="form-control" required>
                {% for site in ['BAT', 'BGL', 'BLO', 'BLR', 'OXL'] %}
                <option value="{{ site }}" {% if user.site_source == site %}selected{% endif %}>{{ site }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="site_destination">Site Destination</label>
            <select id="site_destination" name="site_destination" class="form-control" required>
                {% for site in ['BAT', 'BGL', 'BLO', 'BLR', 'OX'] %}
                <option value="{{ site }}" {% if user.site_destination == site %}selected{% endif %}>{{ site }}</option>
                {% endfor %}
            </select>
        </div>
        <hr>
        <div class="form-group">
            <label for="new_password">New Password <small style="color:#636e72;">(leave blank to keep current)</small></label>
            <input type="password" id="new_password" name="new_password" class="form-control">
        </div>
        <div style="display:flex; gap:1rem; margin-top:1.5rem;">
            <button type="submit" class="btn" style="flex:1;">Save Changes</button>
            <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary" style="flex:1; text-align:center;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
