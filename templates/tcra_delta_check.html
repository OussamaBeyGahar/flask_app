{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2>TCRA Report</h2>
    <h3 style="margin-bottom: 20px; font-weight: 600;">Delta Cross Check</h3>
    <form method="POST" enctype="multipart/form-data">

        <div
            style="margin-top: 20px; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px;">
            <strong style="display: block; margin-bottom: 10px;">SOURCE</strong>
            <div class="form-group">
                <label for="source_tcra_file">TCRA file: Select a TCRA file:</label>
                <input type="file" id="source_tcra_file" name="source_tcra_file" class="form-control"
                    accept=".xlsx,.xlsm" required>
            </div>
        </div>

        <div style="margin-bottom: 20px;">
            <strong style="display: block; margin-bottom: 10px;">DESTINATION</strong>
            <p style="margin-bottom: 10px; font-weight: 500; color: var(--label-color);">Reference/revision or TCRA
                File:</p>

            <div style="display: flex; gap: 20px; margin-bottom: 15px;">
                <label style="display: flex; align-items: center; gap: 5px;">
                    <input type="radio" name="dest_load_type" value="file" id="radio_load_file" checked
                        onchange="toggleDestInput()"> Load file
                </label>
                <label style="display: flex; align-items: center; gap: 5px;">
                    <input type="radio" name="dest_load_type" value="reference" id="radio_load_reference"
                        onchange="toggleDestInput()"> Load by reference
                </label>
            </div>

            <div class="form-group" id="dest_file_group">
                <label for="dest_tcra_file">Select TCRA File:</label>
                <input type="file" id="dest_tcra_file" name="dest_tcra_file" class="form-control" accept=".xlsx,.xlsm">
            </div>

            <div class="form-group" id="dest_ref_group" style="display: none;">
                <label for="dest_tcra_reference">TCRA reference/revision:</label>
                <input type="text" id="dest_tcra_reference" name="dest_tcra_reference" class="form-control">
            </div>
        </div>

        <button type="submit" class="btn" style="width: 100%;">Submit</button>
    </form>
</div>

<script>
    function toggleDestInput() {
        const loadFileRadio = document.getElementById('radio_load_file');
        const fileGroup = document.getElementById('dest_file_group');
        const fileInput = document.getElementById('dest_tcra_file');
        const refGroup = document.getElementById('dest_ref_group');
        const refInput = document.getElementById('dest_tcra_reference');

        if (loadFileRadio.checked) {
            fileGroup.style.display = 'block';
            fileInput.required = true;
            refGroup.style.display = 'none';
            refInput.required = false;
        } else {
            fileGroup.style.display = 'none';
            fileInput.required = false;
            refGroup.style.display = 'block';
            refInput.required = true;
        }
    }

    // Initialize state on load
    document.addEventListener("DOMContentLoaded", toggleDestInput);
</script>
{% endblock %}
