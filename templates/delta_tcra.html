{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2>DELTA TCRA</h2>
    <form method="POST">

        <div
            style="margin-top: 20px; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px;">
            <strong>TCRA Source</strong>
            <div class="form-group" style="margin-top: 10px;">
                <label for="source_tcra_reference">TCRA reference/revision</label>
                <input type="text" id="source_tcra_reference" name="source_tcra_reference" class="form-control"
                    required>
            </div>
            <div class="form-group">
                <label>
                    <input type="checkbox" name="source_on_working"> on working
                </label>
            </div>
        </div>

        <div style="margin-bottom: 20px;">
            <strong>TCRA destination</strong>
            <div class="form-group" style="margin-top: 10px;">
                <label for="destination_tcra_reference">TCRA reference/revision</label>
                <input type="text" id="destination_tcra_reference" name="destination_tcra_reference"
                    class="form-control" required>
            </div>
            <div class="form-group">
                <label>
                    <input type="checkbox" name="destination_on_working"> on working
                </label>
            </div>
        </div>

        <button type="submit" class="btn" style="width: 100%;">Submit</button>
    </form>
</div>
{% endblock %}
