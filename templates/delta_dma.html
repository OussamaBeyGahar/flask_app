{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2>DELTA DMA</h2>
    <form method="POST">

        <div
            style="margin-top: 20px; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px;">
            <strong>DMA Source</strong>
            <div class="form-group" style="margin-top: 10px;">
                <label for="reference_from">DMA reference/revision</label>
                <input type="text" id="reference_from" name="reference_from" class="form-control" required>
            </div>
        </div>

        <div style="margin-bottom: 20px;">
            <strong>DMA destination</strong>
            <div class="form-group" style="margin-top: 10px;">
                <label for="reference_to">DMA reference/revision</label>
                <input type="text" id="reference_to" name="reference_to" class="form-control" required>
            </div>
        </div>

        <button type="submit" class="btn" style="width: 100%;">Submit</button>
    </form>

    {% if error %}
    <div style="margin-top: 1.5rem; padding: 1rem; background: #fff0f0; border-left: 4px solid #d63031; border-radius: 4px;">
        <strong>Error:</strong>
        <pre style="margin: 0.5rem 0 0; white-space: pre-wrap; font-size: 0.85rem;">{{ error }}</pre>
    </div>
    {% endif %}
</div>
{% endblock %}
