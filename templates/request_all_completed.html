{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2>All Completed Requests</h2>
    <p style="color: #636e72; margin-bottom: 1.5rem;">
        Showing completed jobs for <strong>all users</strong>.
    </p>

    {% if error %}
    <p style="color: #d63031;">XML-RPC error: {{ error }}</p>
    {% elif jobs %}
    <div style="overflow-x: auto; overflow-y: auto; max-height: 70vh; border: 1px solid var(--border-color); border-radius: 4px; padding: 6px 10px; background: var(--secondary-bg);">
        <ul style="list-style: none; margin: 0; padding: 0; font-family: monospace; font-size: 0.85rem; white-space: nowrap;">
            {% for item in jobs %}
            <li style="padding: 2px 0; border-bottom: 1px solid var(--border-color);">{{ item }}</li>
            {% endfor %}
        </ul>
    </div>
    {% else %}
    <p style="color: #636e72;">No completed jobs found.</p>
    {% endif %}
</div>
<script>setTimeout(() => location.reload(), 60000);</script>
{% endblock %}
