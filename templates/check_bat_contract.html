{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2>Check BAT contract</h2>
    <form method="POST">
        <div class="form-group">
            <label for="dtr_list">Please enter DTR list to check</label>
            <textarea id="dtr_list" name="dtr_list" class="form-control" rows="5" required></textarea>
        </div>
        <button type="submit" class="btn" style="width: 100%; margin-top: 20px;">Submit</button>
    </form>

    {% if error %}
    <div style="margin-top: 1.5rem; padding: 1rem; background: #fff0f0; border-left: 4px solid #d63031; border-radius: 4px;">
        <strong>Error:</strong>
        <pre style="margin: 0.5rem 0 0; white-space: pre-wrap; font-size: 0.85rem;">{{ error }}</pre>
    </div>
    {% endif %}

    {% if result %}
    <div style="margin-top: 1.5rem; padding: 1rem; background: var(--secondary-color); border-radius: 4px;">
        <strong>Result:</strong>
        <pre style="margin: 0.5rem 0 0; white-space: pre-wrap; font-size: 0.85rem;">{{ result }}</pre>
    </div>
    {% endif %}
</div>
{% endblock %}
